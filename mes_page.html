        flex-grow: 1;

        justify-content: center;

      }

      .avue-home__footer {
        width: 100%;
        flex-grow: 0;
        text-align: center;
        padding: 1em 0;
      }

      .avue-home__footer > a {
        font-size: 12px;
        color: #ababab;
        text-decoration: none;
      }

      .avue-home__loading {
        height: 32px;
        width: 32px;
        margin-bottom: 20px;
      }

      .avue-home__title {
        color: #fff;
        font-size: 14px;
        margin-bottom: 10px;
      }

        color: #ababab;
        font-size: 12px;

      <div class="avue-home">
        <div class="avue-home__main">
          <img class="avue-home__loading" src="./img/svg/loading-spin.svg" alt="loading" />

    <script>
      var div = document.getElementById('showtime')
      let num = 59
      var djs = setInterval(function() {
        div.innerHTML = num
        num--
        if (num == 0) {
            clearInterval(djs)
        }
      }, 1000)
    </script>
